<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">


</head>
<body>
<div class="container d-flex justify-content-center align-items-center vh-100 mb-3 mt-3 ">
    <div class="card p-4 w-100 mb-3 mt-3" style="max-width: 400px;">
        <h3 class="text-center mb-3 mt-3">Iniciar sesión</h3>
        <input type="email" class="form-control mb-3 mt-3 " placeholder="Email">
        <input type="password" class="form-control mb-3 mt-3" placeholder="Contraseña">
        <button class="btn btn-primary w-100 mb-3 mt-3">Ingresar</button>
        <div class="form-check mb-3">
    <input class="form-check-input" type="checkbox">
    <label class="form-check-label">Recordarme</label>
    <a href="#" class="d-block text-center mt-2">¿Olvidaste tu contraseña?</a>
</div>

    </div>
</div>


<script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
